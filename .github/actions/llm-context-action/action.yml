name: LLM Context Analyzer
description: Build a Datalevin semantic graph and export an LLM-facing summary
author: devame

branding:
  icon: git-branch
  color: blue

inputs:
  working-directory:
    description: Project root to analyze
    required: false
    default: .
  upload-artifact:
    description: Upload the database and exports
    required: false
    default: "true"
  artifact-name:
    description: Artifact name
    required: false
    default: llm-context

outputs:
  context-path:
    description: Generated state directory
    value: ${{ steps.analyze.outputs.context-path }}
  total-symbols:
    description: Total symbols in the graph
    value: ${{ steps.analyze.outputs.total-symbols }}
  total-files:
    description: Total files in the graph
    value: ${{ steps.analyze.outputs.total-files }}

runs:
  using: composite
  steps:
    - uses: actions/setup-java@v5
      with:
        distribution: zulu
        java-version: "25"
    - uses: actions/setup-node@v4
      with:
        node-version: "20"
    - name: Install llm-context
      shell: bash
      run: |
        install_dir="$RUNNER_TEMP/llm-context/bin"
        curl -fsSL \
          https://raw.githubusercontent.com/devame/llm-context-tools/v0.7.0/install.sh |
          LLM_CONTEXT_VERSION=0.7.0 \
          LLM_CONTEXT_INSTALL_DIR="$install_dir" \
          LLM_CONTEXT_SKIP_SEMANTIC=1 \
          LLM_CONTEXT_SKIP_PATH_UPDATE=1 sh
        echo "$install_dir" >> "$GITHUB_PATH"
    - name: Analyze and export
      id: analyze
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        llm-context analyze --full
        llm-context export --format json --output .llm-context/export.json
        llm-context summary --output .llm-context/summary.md
        node - <<'NODE'
        const fs = require('fs');
        const graph = JSON.parse(fs.readFileSync('.llm-context/export.json', 'utf8'));
        const entities = graph.entities || [];
        const count = type => entities.filter(e => e['entity/type'] === type).length;
        fs.appendFileSync(process.env.GITHUB_OUTPUT,
          `context-path=${process.cwd()}/.llm-context\n` +
          `total-symbols=${count('entity.type/symbol')}\n` +
          `total-files=${count('entity.type/file')}\n`);
        NODE
    - name: Upload graph artifact
      if: inputs.upload-artifact == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ inputs.working-directory }}/.llm-context/
        retention-days: 30
