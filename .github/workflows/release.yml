name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  semantic-runtime:
    name: NextPlaid API (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            features: model
            executable: next-plaid-api
            archive: tar
            ort_archive: onnxruntime-linux-x64-1.23.0.tgz
            ort_root: onnxruntime-linux-x64-1.23.0
            ort_source: lib/libonnxruntime.so.1.23.0
            ort_name: libonnxruntime.so
            ort_sha256: b6deea7f2e22c10c043019f294a0ea4d2a6c0ae52a009c34847640db75ec5580
          - runner: macos-15
            target: aarch64-apple-darwin
            features: model,accelerate
            executable: next-plaid-api
            archive: tar
            ort_archive: onnxruntime-osx-arm64-1.23.0.tgz
            ort_root: onnxruntime-osx-arm64-1.23.0
            ort_source: lib/libonnxruntime.1.23.0.dylib
            ort_name: libonnxruntime.dylib
            ort_sha256: 8182db0ebb5caa21036a3c78178f17fabb98a7916bdab454467c8f4cf34bcfdf
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            features: model
            executable: next-plaid-api.exe
            archive: zip
            ort_archive: onnxruntime-win-x64-1.23.0.zip
            ort_root: onnxruntime-win-x64-1.23.0
            ort_source: lib/onnxruntime.dll
            ort_name: onnxruntime.dll
            ort_sha256: 72c23470310ec79a7d42d27fe9d257e6c98540c73fa5a1db1f67f538c6c16f2f
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Check out pinned NextPlaid source
        uses: actions/checkout@v4
        with:
          repository: lightonai/next-plaid
          ref: dba1539dd0b725c9bbd61db1920a28ea85787b17
      - uses: dtolnay/rust-toolchain@1.91.1
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build NextPlaid API
        shell: bash
        run: >-
          cargo build --locked --release
          --target "${{ matrix.target }}"
          -p next-plaid-api
          --features "${{ matrix.features }}"
      - name: Package NextPlaid API
        shell: bash
        run: |
          mkdir -p package
          cp "target/${{ matrix.target }}/release/${{ matrix.executable }}" package/
          cp LICENSE package/next-plaid-LICENSE
          curl --fail --location \
            "https://github.com/microsoft/onnxruntime/releases/download/v1.23.0/${{ matrix.ort_archive }}" \
            --output onnxruntime-archive
          if command -v sha256sum >/dev/null 2>&1; then
            ort_actual_sha256="$(sha256sum onnxruntime-archive | cut -d ' ' -f 1)"
          else
            ort_actual_sha256="$(shasum -a 256 onnxruntime-archive | cut -d ' ' -f 1)"
          fi
          test "$ort_actual_sha256" = "${{ matrix.ort_sha256 }}"
          mkdir -p onnxruntime
          if [ "${{ matrix.archive }}" = "zip" ]; then
            7z x onnxruntime-archive -oonnxruntime
          else
            tar -xzf onnxruntime-archive -C onnxruntime
          fi
          cp "onnxruntime/${{ matrix.ort_root }}/${{ matrix.ort_source }}" \
            "package/${{ matrix.ort_name }}"
          cp "onnxruntime/${{ matrix.ort_root }}/LICENSE" \
            package/onnxruntime-LICENSE
          cp "onnxruntime/${{ matrix.ort_root }}/ThirdPartyNotices.txt" \
            package/onnxruntime-ThirdPartyNotices.txt
          if [ "${{ matrix.archive }}" = "zip" ]; then
            (cd package && 7z a "../next-plaid-api-1.6.4-${{ matrix.target }}.zip" .)
          else
            tar -C package -czf "next-plaid-api-1.6.4-${{ matrix.target }}.tar.gz" .
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: next-plaid-api-${{ matrix.target }}
          path: next-plaid-api-1.6.4-${{ matrix.target }}.*
          if-no-files-found: error

  release:
    needs: semantic-runtime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: "25"
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Test and build
        run: |
          npm ci
          clojure -M:test
          clojure -T:build dist
      - name: Verify tag and prepare checksums
        run: |
          APP_VERSION=$(java --enable-native-access=ALL-UNNAMED -jar dist/llm-context.jar version)
          test "$GITHUB_REF_NAME" = "v$APP_VERSION"
          cd dist
          sha256sum llm-context.jar > llm-context.jar.sha256
      - name: Download semantic runtime artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: next-plaid-api-*
          path: dist
          merge-multiple: true
      - name: Checksum semantic runtime artifacts
        run: |
          cd dist
          for artifact in next-plaid-api-*; do
            sha256sum "$artifact" > "$artifact.sha256"
          done
      - name: Smoke-test installer against release artifacts
        run: test/install-unix.sh
      - name: Smoke-test installed LateOn pipeline
        run: test/install-semantic-unix.sh "$GITHUB_WORKSPACE/dist"
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/llm-context.jar \
            dist/llm-context.jar.sha256 \
            dist/next-plaid-api-* \
            install.sh \
            install.ps1 \
            --generate-notes \
            --verify-tag
